name: Self-Hosted BBP Discovery Scan

# ============================================================================
# SECURITY NOTE - read this before editing triggers, especially if this
# repo is/becomes PUBLIC:
#
#   Triggers below are ONLY `schedule` and `workflow_dispatch`.
#   NEVER add `pull_request` or `pull_request_target` to this file.
#   Those triggers can run workflow code (including this one, with your
#   GEMINI_API_KEY and DISCORD_WEBHOOK_URL secrets in its environment)
#   against code from a fork/PR you don't control - this is the #1 way
#   public-repo Actions secrets get stolen. `workflow_dispatch` is safe
#   because only people with WRITE access to this repo can trigger it.
#
#   Secrets are only ever injected as environment variables for the one
#   "Run scanner" step below, are never echoed/printed by this workflow,
#   and scanner.py itself redacts them from all of its own log output.
# ============================================================================
#
# Runs on a normal cron schedule - a bounded, scheduled job, NOT a
# persistent process or a self-retriggering repository_dispatch loop.
# GitHub Actions does not support and does not permit workflows used as
# a substitute for an always-on server (see GitHub's Acceptable Use
# Policies). Every run here does one bounded pass and exits.
#
# Every 30 minutes is deliberate, not arbitrary: crt.sh (whichever path
# is used) and Gemini's free tier don't meaningfully benefit from being
# polled more often than this, and state.json makes each run pick up
# exactly where the last one left off - so 30 min intervals still catch
# everything continuously, just without the overhead of nonstop polling.
# disclose.io (the second, more reliable discovery source) is diffed by
# commit, so a new program showing up there is caught on the very next
# scheduled run after it's merged - typically within minutes.
#
# 100% free: this is a public repo, so GitHub Actions minutes are
# unlimited and unmetered (GitHub only meters Actions minutes on private
# repos). crt.sh, disclose.io/GitHub's API, and the Gemini free tier all
# cost nothing either.
#
# If you need a true persistent certstream websocket listener, run
# scanner.py's underlying logic on a real host you control instead -
# GitHub-hosted runners are the wrong tool for that specific job.

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:          # manual trigger from the Actions tab (write-access only)

concurrency:
  group: bbp-discovery-scan
  cancel-in-progress: false   # never kill a run already in progress

permissions:
  contents: write   # needed only to commit state.json back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55   # hard platform-level backstop above the script's own 50-min budget

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true   # needed for the git push step below

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests psycopg2-binary

      - name: Run scanner (bounded, single pass)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SCAN_TIME_BUDGET_MINUTES: '50'
          SCAN_WINDOW_MINUTES: '1440'
          SCAN_OVERLAP_MINUTES: '10'
          CRTSH_KEYWORDS: 'bugbounty,vdp'
          STATE_FILE_PATH: 'state.json'
          RESULTS_OUTPUT_PATH: 'results.json'
        run: python3 scanner.py

      - name: Upload results as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: results.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit updated state.json back to the repo
        if: always()
        run: |
          git config user.name "bbp-scanner-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -f state.json ]; then
            git add state.json
            git diff --cached --quiet || git commit -m "chore: update scan state [skip ci]"
            git push
          else
            echo "No state.json produced this run, nothing to commit"
          fi
